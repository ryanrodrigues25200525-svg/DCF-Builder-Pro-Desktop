name: Desktop Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            artifact_name: macos
          - os: windows-latest
            artifact_name: windows
          - os: ubuntu-latest
            artifact_name: linux

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install Linux packaging dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libnss3 libatk-bridge2.0-0 libgtk-3-0 libxss1 libasound2t64

      - name: Install root dependencies
        run: npm ci

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Install backend dependencies
        run: python -m pip install -r backend/requirements.txt

      - name: Build desktop release
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          GH_TOKEN: ${{ github.token }}
        run: npm run electron:build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dcf-builder-${{ matrix.artifact_name }}
          path: |
            dist-electron/*.AppImage
            dist-electron/*.deb
            dist-electron/*.dmg
            dist-electron/*.exe
            dist-electron/*.rpm
            dist-electron/*.tar.gz
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/**/*
          name: DCF Builder Pro Desktop ${{ github.ref_name }}
          body: |
            ## Download DCF Builder Pro

            Pick the installer for your computer:

            | System | File to download |
            | --- | --- |
            | macOS | `.dmg` |
            | Windows | `Setup .exe` |
            | Linux | `.AppImage` or `.deb` |

            The app includes everything it needs to run. You do not need to install Python, Node.js, npm, or developer tools.

            ## First Open

            This app is open source and not code-signed yet, so macOS or Windows may show a trust warning the first time you open it.

            On macOS, right-click the app and choose **Open**. On Windows, choose **More info**, then **Run anyway**.
